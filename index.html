<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мои соцсети</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
  }

  body {
    position: relative;
    overflow-x: hidden;
    overflow-y: auto;
    background: #0b0b0b;
  }

  body::before {
    content: "";
    position: fixed;
    inset: -20px;
    background: url('IMG_7182.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(10px);
    transform: scale(1.05);
    z-index: -2;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.15);
    z-index: -1;
  }

  .wrapper {
    margin-top: 36px;
    background-color: rgba(255, 255, 255, 0.12);
    border-radius: 31.25px;
    padding: 62.5px 47px;
    backdrop-filter: blur(10px);
    box-shadow: 0 18.75px 46.875px rgba(0, 0, 0, 0.25);
    animation: fadeInUp 1.2s ease forwards;
    opacity: 0;
    transform: translateY(25px);
    max-width: 750px;
    width: 100%;
  }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .button-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .button {
    width: 100%;
    min-height: 140px;
    padding: 25px 37.5px;
    font-size: 34.375px;
    font-weight: bold;
    border: 2.5px solid #000;
    border-radius: 25px;
    color: #fff;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 31.25px;
    box-shadow: 0 12.5px 31.25px rgba(0, 0, 0, 0.25);
    transition: all 0.35s ease;
    cursor: pointer;
    outline: none;
    position: relative;
    overflow: hidden;
    background-size: 200% 200%;
  }

  .button::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
    transform: rotate(25deg);
    transition: all 0.75s ease;
    pointer-events: none;
  }

  .button:hover::before {
    top: -25%;
    left: -25%;
  }

  .button:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    border-color: #000;
  }

  .button:active {
    transform: scale(0.97);
  }

  .button i {
    font-size: 50px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.4));
  }

  .button span {
    display: inline-block;
    word-break: break-word;
    line-height: 1.2;
    flex: 1;
  }

  .telegram {
    background: linear-gradient(135deg, #0b0f14, #1b222c, #2f3a48);
    color: #e9f1ff;
  }

  .instagram {
    background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4);
    animation: gradientMove 6s ease infinite;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .instagram i {
    background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, 
      #fd5949 45%, #d6249f 60%, #285AEB 90%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .info-wrapper {
    background-color: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(6px);
    border-radius: 31.25px;
    margin-top: 36px;
    padding: 37.5px 47px;
    width: 95vw;
    max-width: 750px;
    box-shadow: 0 15.625px 37.5px rgba(0, 0, 0, 0.3);
  }

  .proofs-wrapper {
    background-color: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(6px);
    border-radius: 31.25px;
    margin-top: 36px;
    padding: 28px;
    width: 95vw;
    max-width: 750px;
    box-shadow: 0 15.625px 37.5px rgba(0, 0, 0, 0.3);
  }

  .info-text {
    font-size: 35.9px;
    color: #fff;
    text-align: center;
    line-height: 1.6;
  }

  .proofs-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 28px;
    padding: 18px;
    background: rgba(255, 255, 255, 0.08);
    border: 1.5px solid rgba(255, 255, 255, 0.18);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  .proofs-carousel {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: pan-y;
  }

  .proofs-track {
    display: flex;
    width: 100%;
    height: 100%;
    transition: transform 0.35s ease;
  }

  .proofs-slide {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
  }

  .proofs-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    width: 100%;
    height: 100%;
  }

  .proof-card {
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.04);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.12);
  }

  .proof-card img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .proof-link {
    display: block;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  .proofs-dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
  }

  .proofs-dot {
    width: 10px;
    height: 10px;
    border: 0;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.28);
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .proofs-dot.is-active {
    background: #fff;
    transform: scale(1.15);
  }

  .lightbox {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.82);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
    z-index: 20;
  }

  .lightbox.is-open {
    opacity: 1;
    visibility: visible;
  }

  .lightbox-dialog {
    position: relative;
    width: min(92vw, 520px);
    max-height: 90vh;
    border-radius: 24px;
    overflow: hidden;
    background: rgba(18, 18, 18, 0.96);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
  }

  .lightbox-image {
    display: block;
    width: 100%;
    height: auto;
    max-height: 90vh;
    object-fit: contain;
    background: #111;
  }

  .lightbox-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 42px;
    height: 42px;
    border: 0;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.58);
    color: #fff;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
  }

  .lightbox-close:hover {
    background: rgba(0, 0, 0, 0.78);
  }

  @media (max-width: 768px) {
    html, body {
      padding: 14px;
    }

    .wrapper {
      margin-top: 36px;
      padding: 22px 18px;
      border-radius: 24px;
    }

    .button {
      min-height: 84px;
      padding: 18px 20px;
      font-size: 22px;
      gap: 16px;
      border-radius: 20px;
    }

    .button i {
      font-size: 34px;
    }

    .info-wrapper {
      margin-top: 20px;
      padding: 20px 16px;
      border-radius: 24px;
      width: 100%;
    }

    .proofs-wrapper {
      margin-top: 20px;
      padding: 16px;
      border-radius: 24px;
      width: 100%;
    }

    .info-text {
      font-size: 20px;
      line-height: 1.5;
    }

    .proofs-frame {
      padding: 10px;
      border-radius: 22px;
      aspect-ratio: auto;
      min-height: 340px;
    }

    .proofs-grid {
      gap: 10px;
    }

    .proof-card {
      border-radius: 16px;
      padding: 0;
    }

    .proofs-dots {
      margin-top: 14px;
      gap: 8px;
    }

    .lightbox {
      padding: 14px;
    }

    .lightbox-dialog {
      width: 100%;
      border-radius: 20px;
    }
  }
</style>

</head>
<body>

  <div class="info-wrapper">
    <div class="info-text">
      Если не открывает ссылку — нажмите «...», и откройте страницу через браузер.
    </div>
  </div>

  <div class="wrapper">
    <div class="button-container">
	  <a class="button telegram" href="https://t.me/Vlad_hrs" target="_blank">
        <i class="fab fa-telegram-plane"></i>
        <span>Работа без вложений</span>
      </a>
	  
    </div>
  </div>

  <div class="proofs-wrapper">
    <div class="proofs-frame">
      <div class="proofs-carousel" id="proofsCarousel">
        <div class="proofs-track" id="proofsTrack">
          <div class="proofs-slide">
            <div class="proofs-grid">
              <div class="proof-card">
                <a class="proof-link" href="photo_2026-05-05_09-12-17.jpg" data-full-image="photo_2026-05-05_09-12-17.jpg">
                  <img src="photo_2026-05-05_09-12-17.jpg" alt="Скрин выплаты 1">
                </a>
              </div>
              <div class="proof-card">
                <a class="proof-link" href="photo_2026-05-05_09-12-27.jpg" data-full-image="photo_2026-05-05_09-12-27.jpg">
                  <img src="photo_2026-05-05_09-12-27.jpg" alt="Скрин выплаты 2">
                </a>
              </div>
              <div class="proof-card">
                <a class="proof-link" href="photo_2026-05-05_09-12-30.jpg" data-full-image="photo_2026-05-05_09-12-30.jpg">
                  <img src="photo_2026-05-05_09-12-30.jpg" alt="Скрин выплаты 3">
                </a>
              </div>
              <div class="proof-card">
                <a class="proof-link" href="photo_2026-05-05_09-12-33.jpg" data-full-image="photo_2026-05-05_09-12-33.jpg">
                  <img src="photo_2026-05-05_09-12-33.jpg" alt="Скрин выплаты 4">
                </a>
              </div>
            </div>
          </div>
          <div class="proofs-slide">
            <div class="proofs-grid">
              <div class="proof-card">
                <a class="proof-link" href="photo_2026-05-05_12-11-44.jpg" data-full-image="photo_2026-05-05_12-11-44.jpg">
                  <img src="photo_2026-05-05_12-11-44.jpg" alt="Скрин выплаты 5">
                </a>
              </div>
              <div class="proof-card">
                <a class="proof-link" href="photo_2026-05-05_12-12-01.jpg" data-full-image="photo_2026-05-05_12-12-01.jpg">
                  <img src="photo_2026-05-05_12-12-01.jpg" alt="Скрин выплаты 6">
                </a>
              </div>
              <div class="proof-card">
                <a class="proof-link" href="photo_2026-05-05_12-12-09.jpg" data-full-image="photo_2026-05-05_12-12-09.jpg">
                  <img src="photo_2026-05-05_12-12-09.jpg" alt="Скрин выплаты 7">
                </a>
              </div>
              <div class="proof-card">
                <a class="proof-link" href="photo_2026-05-05_12-12-15.jpg" data-full-image="photo_2026-05-05_12-12-15.jpg">
                  <img src="photo_2026-05-05_12-12-15.jpg" alt="Скрин выплаты 8">
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="proofs-dots" id="proofsDots">
      <button class="proofs-dot is-active" type="button" aria-label="Набор 1"></button>
      <button class="proofs-dot" type="button" aria-label="Набор 2"></button>
    </div>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-dialog">
      <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Закрыть">×</button>
      <img class="lightbox-image" id="lightboxImage" src="" alt="Увеличенный скрин">
    </div>
  </div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxClose = document.getElementById('lightboxClose');
    const proofLinks = document.querySelectorAll('.proof-link');
    const proofsCarousel = document.getElementById('proofsCarousel');
    const proofsTrack = document.getElementById('proofsTrack');
    const proofsDots = Array.from(document.querySelectorAll('.proofs-dot'));
    let currentSlide = 0;
    let swipeStartX = 0;
    let swipeDeltaX = 0;

    function updateCarousel() {
      proofsTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
      proofsDots.forEach((dot, index) => {
        dot.classList.toggle('is-active', index === currentSlide);
      });
    }

    proofsDots.forEach((dot, index) => {
      dot.addEventListener('click', () => {
        currentSlide = index;
        updateCarousel();
      });
    });

    proofsCarousel.addEventListener('touchstart', (event) => {
      swipeStartX = event.touches[0].clientX;
      swipeDeltaX = 0;
    }, { passive: true });

    proofsCarousel.addEventListener('touchmove', (event) => {
      swipeDeltaX = event.touches[0].clientX - swipeStartX;
    }, { passive: true });

    proofsCarousel.addEventListener('touchend', () => {
      if (Math.abs(swipeDeltaX) < 50) return;
      if (swipeDeltaX < 0 && currentSlide < proofsDots.length - 1) {
        currentSlide += 1;
      }
      if (swipeDeltaX > 0 && currentSlide > 0) {
        currentSlide -= 1;
      }
      updateCarousel();
    });

    function openLightbox(imageSrc, imageAlt) {
      lightboxImage.src = imageSrc;
      lightboxImage.alt = imageAlt;
      lightbox.classList.add('is-open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
      document.body.style.overflow = '';
    }

    proofLinks.forEach((link) => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        const image = link.querySelector('img');
        openLightbox(link.dataset.fullImage, image ? image.alt : 'Скрин');
      });
    });

    lightboxClose.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
        closeLightbox();
      }
    });
  </script>
</body>
</html>
